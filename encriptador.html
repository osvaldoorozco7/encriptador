<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./encriptador.css">
    </head>
    <body>

        <header>
            <h1>Encriptador</h1>
        </header>

        <main>

            <div class="div_logo">
                <img src="./logo.svg" alt="">
            </div>

            <section class="text_areas">

                <div class="entrada">

                    <textarea name="text_area_1" id="text_in"  class="entrada_texto" placeholder="Ingrese el texto..."></textarea>

                    <div class="botones">
                        <button id="boton_encriptar" class="boton_azul">Encriptar</button>
                        <button id="boton_desencriptar" class="boton_blanco">Desencriptar</button>
                    </div>

                </div>

                <div class="salida">
                    <textarea name="text_area_2" id="text_out" rows="20" class="salida_texto"></textarea>
                    <br>
                    <button id="copiar" class="boton_azul">Copiar</button>
                </div>
            </section>

        </main>


        <footer class="copyright">&copy Code Monkey</footer>


        <script src="./encriptador.js"></script>
    </body>
</html>
