<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./encriptador.css">
    </head>
    <body>

        <header>
            Encriptador
        </header>

        <main>

        <section class="text_areas">
            <textarea name="text_area_1" id="text_in" cols="90" rows="10"></textarea>

            <textarea name="text_area_2" id="text_out" cols="60" rows="10"></textarea>
        </section>

        <br>
        <button id="boton_encriptar">Encriptar</button>
        <button>Desencriptar</button>
        </main>


        <footer class="copyright">&copy Code Monkey</footer>

        <script>

            function encriptarMensaje() {

                var frase = document.getElementById('text_in').value;
                let fraseEncriptada = [];

                console.log(typeof(frase))
                console.log(frase.length)
                
                for (var x = 0; x < frase.length; x++) {
                        if (frase[x] == 'a') {
                            fraseEncriptada.push('ai');
                        }
                        else if (frase[x] == 'e') {
                            fraseEncriptada.push('enter');
                        }
                        else if (frase[x] == 'i') {
                            fraseEncriptada.push('imes');
                        }
                        else if (frase[x] == 'o') {
                            fraseEncriptada.push('ober');
                        }
                        else if (frase[x] == 'u') {
                            fraseEncriptada.push('ufat');
                        }
                        else {
                            fraseEncriptada.push(frase[x]);
                        }
                    }

                let result = fraseEncriptada.toString();
                console.log(result.replaceAll(',', ''))
            }
            var boton_2 = document.getElementById('boton_encriptar');
            boton_2.onclick = encriptarMensaje;

        </script>
    </body>
</html>
