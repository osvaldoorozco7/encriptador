<!DOCTYPE html>
<html>

        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./encriptador.css">
    </head>
    <body>

        <header>
            Encriptador
        </header>

        <main>

            <div class="div_logo">
                <img src="./logo.svg" alt="" class="logo">
            </div>

            <section class="text_areas">

                <div class="">
                    <textarea name="text_area_1" id="text_in" cols="50" rows="10" class="entrada"></textarea>
                </div>

                <div class="">
                    <textarea name="text_area_2" id="text_out" cols="50" rows="10" class="salida"></textarea>
                </div>
            </section>

            <section class="botones">
                <br>
                <button id="boton_encriptar" class="boton">Encriptar</button>
                <button id="boton_desencriptar" class="boton">Desencriptar</button>
            </section>

        </main>


        <footer class="copyright">&copy Code Monkey</footer>


        <script src="./encriptador.js"></script>
